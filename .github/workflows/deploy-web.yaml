name: Deploy intspeed.rotko.net

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'cmd/wasm/**'
      - 'pkg/**'
      - '.github/workflows/deploy-web.yaml'
  workflow_dispatch:

env:
  CONTAINER_NAME: intspeed-web
  CONTAINER_PORT: 55556
  PROJECT_DIR: intspeed-web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build WASM engine
        run: |
          cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" web/ 2>/dev/null \
            || cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" web/
          GOOS=js GOARCH=wasm go build -ldflags "-s -w" -o web/main.wasm ./cmd/wasm

          # verify build succeeded
          if [ ! -f web/main.wasm ]; then
            echo "Build failed: no main.wasm found"
            exit 1
          fi

          tar czf site.tar.gz web/

      - name: Upload site
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: site.tar.gz
          target: /home/${{ secrets.DEPLOY_USER }}/

      - name: Deploy container
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.DEPLOY_USER }}

            cat > nginx-intspeed.conf << 'NGINX_EOF'
            server {
                listen 80;
                server_name localhost;
                root /usr/share/nginx/html;
                index index.html;

                # gzip: essential — main.wasm is ~11 MB raw, ~2.5 MB compressed
                gzip on;
                gzip_vary on;
                gzip_min_length 1024;
                gzip_types text/plain text/css application/javascript application/json application/wasm;

                location = /main.wasm {
                    types { application/wasm wasm; }
                    add_header Cache-Control "public, max-age=3600";
                }

                location = /index.html {
                    add_header Cache-Control "no-cache, must-revalidate" always;
                }

                location / {
                    try_files $uri =404;
                }

                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            }
            NGINX_EOF

            tar xzf site.tar.gz
            mkdir -p ${{ env.PROJECT_DIR }}
            rm -rf ${{ env.PROJECT_DIR }}/*
            mv web/* ${{ env.PROJECT_DIR }}/

            podman stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            podman rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            podman run -d \
              --name ${{ env.CONTAINER_NAME }} \
              -p 127.0.0.1:${{ env.CONTAINER_PORT }}:80 \
              -v /home/${{ secrets.DEPLOY_USER }}/${{ env.PROJECT_DIR }}:/usr/share/nginx/html:ro,Z \
              -v /home/${{ secrets.DEPLOY_USER }}/nginx-intspeed.conf:/etc/nginx/conf.d/default.conf:ro,Z \
              --restart unless-stopped \
              nginx:alpine

            sleep 2
            if ! podman ps | grep -q ${{ env.CONTAINER_NAME }}; then
              echo "Container failed to start"
              podman logs ${{ env.CONTAINER_NAME }}
              exit 1
            fi

            curl -f http://127.0.0.1:${{ env.CONTAINER_PORT }}/ > /dev/null || {
              echo "Site not responding"
              podman logs ${{ env.CONTAINER_NAME }}
              exit 1
            }

            rm -f site.tar.gz
            rm -rf web/

            echo "Deployment successful"
